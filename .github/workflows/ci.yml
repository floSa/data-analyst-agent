name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff format --check .
      - run: uv run ruff check .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build de l'image sandbox (cache GitHub Actions)
        uses: docker/build-push-action@v6
        with:
          context: src/data_analyst_agent/sandbox/image
          tags: data-analyst-agent-sandbox:0.1
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --locked
      # Suite complète : unit + intégration (Docker, testcontainers) + e2e golden.
      # Les tests "live" (LLM local) sont exclus via addopts ;
      # une couverture < 85 % fait échouer le job (--cov-fail-under).
      - run: uv run pytest
