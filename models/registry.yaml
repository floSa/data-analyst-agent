# Registre des modèles ML métier (CADRAGE §7-③).
# model_path est relatif à ce fichier ; les artefacts sont produits par notebooks/.
models:
  - dataset: maxizoo_sales
    task: regression
    model_path: maxizoo_sales.joblib
    target: quantity
    unit: unités vendues (pour un SKU, un magasin et un jour)
    description: >-
      Prévision de la quantité vendue d'un SKU dans un magasin un jour donné —
      pipeline scikit-learn (one-hot + HistGradientBoostingRegressor) entraîné
      sur les 1,35 M de lignes non censurées de sales_daily. Prend les attributs
      du produit et du magasin (et non leurs identifiants), le calendrier, la
      remise et l'anomalie de température.
