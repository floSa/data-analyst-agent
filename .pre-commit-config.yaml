repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        # artefact ML assumé (812 Ko : 300 arbres sur 1,35 M de lignes) ; la
        # limite reste 500 Ko ailleurs. La base Maxizoo, elle, n'est pas
        # versionnée du tout — elle se construit via scripts/load_maxizoo_duckdb.py
        exclude: ^models/maxizoo_sales\.joblib$
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
